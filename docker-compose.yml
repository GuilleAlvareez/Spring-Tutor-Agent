services:

  agent:
    build: ./agent
    ports:
      - "8000:8000"
    env_file:
      - ./agent/.env

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - AGENT_URL=http://agent:8000
    depends_on:
      - agent

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend